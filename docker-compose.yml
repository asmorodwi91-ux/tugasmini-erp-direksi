# ============================================================
# Mini ERP - Modul Direksi
# docker-compose.yml versi FINAL (backend + frontend)
# ============================================================
# Container:
#   app      = Laravel 13 (PHP 8.3-fpm) — API
#   nginx    = web server backend        — http://localhost:8081
#   mysql    = database (skema 3NF)
#   redis    = cache + queue
#   worker   = queue listener (proses async)
#   frontend = Nuxt 3 (Vue)              — http://localhost:3000
# ============================================================

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: erp_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    container_name: erp_nginx
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: erp_mysql
    # Izinkan pembuatan trigger tanpa SUPER privilege (untuk audit_log immutable)
    command: --log-bin-trust-function-creators=1
    environment:
      MYSQL_DATABASE: mini_erp_direksi
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: erp
      MYSQL_PASSWORD: erp
    # Port TIDAK di-expose ke luar (hindari konflik dengan MySQL lain di Mac).
    # Antar-container akses lewat host 'mysql' port 3306.
    expose:
      - "3306"
    volumes:
      - dbdata:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: erp_redis
    expose:
      - "6379"

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: erp_worker
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: php artisan queue:work redis --tries=3
    depends_on:
      - app
      - redis

  frontend:
    image: node:20-alpine
    container_name: erp_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    # Install dependency lalu jalankan Nuxt dev server, bind ke semua interface
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      # Base URL API backend (diakses dari browser user, jadi pakai localhost:8081)
      NUXT_PUBLIC_API_BASE: http://localhost:8081/api
    depends_on:
      - app

volumes:
  dbdata: